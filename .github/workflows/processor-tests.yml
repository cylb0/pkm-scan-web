name: PKMScan CI - Processor Tests

on:
  push:
    branches: [ "**" ]
    paths:
      - 'services/img_processor/**'
      - 'aws_shared/**'
      - '.github/workflows/processor-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/img_processor/**'
      - 'aws_shared/**'

jobs:
  test-processor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Create dummy .env
        run: |
            touch .env
            echo "POSTGRES_DB=test_db" >> .env
            echo "POSTGRES_USER=user" >> .env
            echo "POSTGRES_PASSWORD=pass" >> .env
            echo "AWS_REGION_NAME=us-east-1" >> .env
            echo "AWS_STORAGE_BUCKET=dummy-bucket" >> .env
            echo "AWS_RAW_IMG_QUEUE_URL=https://sqs.dummy.url" >> .env

      - name: Build and Run Tests
        run: |
          docker compose run --rm processor python3 -m unittest discover tests